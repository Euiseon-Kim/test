version: '3.8'

services:
  ozr-backend:
    image: ozr-backend:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozr-backend
    ports:
      - "8080:8080"
    environment:
      # GitLab 설정 - 환경변수 또는 .env 파일로 주입
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-http://your-gitlab.example.com}
      - GITLAB_API_URL=${GITLAB_API_URL:-http://your-gitlab.example.com/api/v4}
      - GITLAB_BOT_TOKEN=${GITLAB_BOT_TOKEN}
      # JWT 비밀키 - 운영 환경에서 반드시 강력한 키로 교체
      - JWT_SECRET=${JWT_SECRET:-changeme-use-a-very-long-secret-key-at-least-32-chars}
      # H2 DB 파일 경로
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/ozrdb;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
    volumes:
      - ozr-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ozr-data:
    driver: local
